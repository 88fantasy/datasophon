syntax = "proto3";
package com.datasophon.grpc;

option java_package = "com.datasophon.grpc.api";
option java_multiple_files = true;
option java_outer_classname = "WorkerProto";

import "common.proto";

/**
 * Worker 命令服务（Phase 1）：Master → Worker 的远程调用。
 *
 * Phase 1 覆盖：PingActor、ExecuteCmdActor、LogActor（及同构的 RMStateActor、NMStateActor）
 * Phase 2+ 追加：InstallServiceRole、ConfigureServiceRole、StartServiceRole 等
 */
service WorkerCommandService {
    rpc Ping       (PingRequest)       returns (ExecResultPb);
    rpc ExecuteCmd (ExecuteCmdRequest) returns (ExecResultPb);
    rpc GetLog     (GetLogRequest)     returns (ExecResultPb);
}

message PingRequest {
    string message = 1;
}

/**
 * 覆盖三类 Actor：
 *   - ExecuteCmdActor  →  commands（命令 + 参数列表）
 *   - RMStateActor     →  command_line（单行 shell 命令）
 *   - NMStateActor     →  command_line（单行 shell 命令）
 * 两个字段互斥，服务端优先判断 command_line 是否非空。
 */
message ExecuteCmdRequest {
    repeated string commands     = 1;
    string          command_line = 2;
}

message GetLogRequest {
    string log_file    = 1;
    string base_dir    = 2;
    string run_as_user = 3;
}
