syntax = "proto3";
package com.datasophon.grpc;

option java_package = "com.datasophon.grpc.api";
option java_multiple_files = true;
option java_outer_classname = "WorkerProto";

import "common.proto";

/**
 * Worker 命令服务（Phase 1+2+3）：Master → Worker 的远程调用。
 *
 * Phase 1：PingActor、ExecuteCmdActor、LogActor（及同构的 RMStateActor、NMStateActor）
 * Phase 2：InstallServiceRole、ConfigureServiceRole、Start/Stop/Restart/Status
 * Phase 3：Unix User/Group、FileOperate、AlertConfig
 */
service WorkerCommandService {
    // Phase 1
    rpc Ping       (PingRequest)       returns (ExecResultPb);
    rpc ExecuteCmd (ExecuteCmdRequest) returns (ExecResultPb);
    rpc GetLog     (GetLogRequest)     returns (ExecResultPb);
    // Phase 2
    rpc InstallServiceRole   (ServiceRoleRequest) returns (ExecResultPb);
    rpc ConfigureServiceRole (ServiceRoleRequest) returns (ExecResultPb);
    rpc StartServiceRole     (ServiceRoleRequest) returns (ExecResultPb);
    rpc StopServiceRole      (ServiceRoleRequest) returns (ExecResultPb);
    rpc RestartServiceRole   (ServiceRoleRequest) returns (ExecResultPb);
    rpc ServiceRoleStatus    (ServiceRoleRequest) returns (ExecResultPb);
    // Phase 3
    rpc CreateUnixGroup     (UnixGroupRequest)    returns (ExecResultPb);
    rpc DeleteUnixGroup     (UnixGroupRequest)    returns (ExecResultPb);
    rpc CreateUnixUser      (UnixUserRequest)     returns (ExecResultPb);
    rpc DeleteUnixUser      (UnixUserRequest)     returns (ExecResultPb);
    rpc OperateFile         (FileOperateRequest)  returns (ExecResultPb);
    rpc GenerateAlertConfig (AlertConfigRequest)  returns (ExecResultPb);
}

message PingRequest {
    string message = 1;
}

/**
 * 覆盖三类 Actor：
 *   - ExecuteCmdActor  →  commands（命令 + 参数列表）
 *   - RMStateActor     →  command_line（单行 shell 命令）
 *   - NMStateActor     →  command_line（单行 shell 命令）
 * 两个字段互斥，服务端优先判断 command_line 是否非空。
 */
message ExecuteCmdRequest {
    repeated string commands     = 1;
    string          command_line = 2;
}

message GetLogRequest {
    string log_file    = 1;
    string base_dir    = 2;
    string run_as_user = 3;
}

/**
 * Phase 2：服务角色操作通用请求。
 *
 * json_payload    = Jackson 序列化的命令 POJO（cofigFileMap 字段置 null）
 * config_map_json = cofigFileMap 序列化为 List&lt;ConfigFileEntry&gt; 的 JSON
 *                   （仅 ConfigureServiceRole / InstallServiceRole 使用）
 */
message ServiceRoleRequest {
    string service_name      = 1;
    string service_role_name = 2;
    string json_payload      = 3;
    string config_map_json   = 4;
}

// Phase 3: Unix 用户/组管理

/** Unix 组操作请求（create / delete 共用）。 */
message UnixGroupRequest {
    string group_name = 1;
}

/** Unix 用户操作请求（create / delete 共用；delete 只需 username）。 */
message UnixUserRequest {
    string username     = 1;
    string main_group   = 2;
    string other_groups = 3;
}

/** 文件写入操作请求。lines 与 content 互斥，优先判断 lines 是否非空。 */
message FileOperateRequest {
    string          path    = 1;
    string          content = 2;
    repeated string lines   = 3;
}

/**
 * 已退役的 Prometheus 告警配置生成请求。
 * 保留消息用于兼容旧 worker.proto 方法号；服务端返回 unsupported。
 */
message AlertConfigRequest {
    int32  cluster_id      = 1;
    string config_map_json = 2;
}
