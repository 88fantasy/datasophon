apiVersion: v1
kind: Service
metadata:
  name: {{ include "datasophon-k8s-agent.fullname" . }}
  labels:
    {{- include "datasophon-k8s-agent.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
      nodePort: {{ .Values.service.nodePort }}
  selector:
    {{- include "datasophon-k8s-agent.selectorLabels" . | nindent 4 }}
