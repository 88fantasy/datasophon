language=chinese
install.path=/data/install_datasophon
frameCode=DDP-1.0.0
clusterId=17
rows=200
times=20
timeOutPeriodOne=1
timeOutPeriodTwo=2
HADOOP_HOME=/data/install_datasophon/hadoop
INIT_HOME=/data/datasophon/datasophon-init
id_rsa=/root/.ssh/id_rsa
ssh_port=22

# datasource config
datasource.ip=127.0.0.1
datasource.port=3306
datasource.database=datasophon
datasource.username=root
datasource.password=datasophon

# nexus
nexus.enable=true
nexus.ip=127.0.0.1
nexus.port=8081
nexus.username=admin
nexus.password=admin123

# server
masterHost=ddp123
masterWebPort=8081
server.address=0.0.0.0
