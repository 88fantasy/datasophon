language=chinese
install.path=/data/install_datasophon
frameCode=DDP-1.0.0
clusterId=1
rows=200
times=20
INIT_HOME=/data/datasophon/datasophon-init
MASTER_INSTALL_HOME=/data/datasophon
ssh_port=22

mysql.ip=mw-mysql
mysql.port=3306
mysql.database=datasophon
mysql.username=datasophon
mysql.password=datasophon

# masterHost：Master(datasophon-api) 的可达地址，Worker 用于 gRPC 注册/心跳 + HTTP 资源下载。
# 【真实 k8s 部署】填 datasophon-api 的集群外可达 IP（如 NodePort 宿主机 IP）或域名，
#   不要填 k8s serviceName（Worker 在集群外无法 DNS 解析）。
# 【compose 本地模拟】使用 Docker DNS 名 mw-api 仅供本地测试。
masterHost=mw-api

# worker.hostname：可选，留空则自动探测（InetAddress.getLocalHost().getHostName()）。
# 若 /etc/hostname 是短名但系统返回 FQDN，须显式指定以与 Master DB 中存储的主机名对齐。
# worker.hostname=

# worker.ip：本节点向 Master 上报的可达 IP，Master 用于 gRPC 回拨。
# 留空则自动探测（InetAddress.getLocalHost().getHostAddress()）。
# 【k8s hostNetwork】自动探测即节点 IP，通常集群外可达，可留空。
# 【多网卡裸机】若自动探测选错网卡，请在此处显式指定目标网卡 IP。
# worker.ip=

# server.port：Master Web 端口（Worker 从 Master 下载资源时使用）
server.port=8080

temp.dir=/tmp/datasophon

nexus.enable=true
nexus.ip=mw-nexus
nexus.port=8081
nexus.username=admin
nexus.password=admin123
