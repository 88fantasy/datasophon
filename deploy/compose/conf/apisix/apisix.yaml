# APISIX standalone 路由/上游/全局规则声明式配置。
# 结尾的 #END 标记是硬性要求 —— 缺失时 APISIX 不会加载本文件的规则。
#
# global_rules 里挂载 prometheus 插件是必需的:export_addr(config.yaml)只负责
# "暴露指标端点",真正采集 apisix_http_status / apisix_bandwidth / apisix_http_latency
# 等逐请求指标要靠 prometheus 插件挂在请求链路上完成。

upstreams:
  - id: 1
    type: roundrobin
    nodes:
      "obs-echo:5678": 1

routes:
  - id: 1
    uri: /get
    upstream_id: 1

global_rules:
  - id: 1
    plugins:
      prometheus:
        prefer_name: true
#END
