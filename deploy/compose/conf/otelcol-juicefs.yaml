# OTel Collector 配置：采集 Doris Prometheus 指标 → Doris，并接收 api/worker OTLP traces + logs
#
# 用于 deploy/compose/docker-compose.observability.yml 的本地链路验证。
# 与生产 otelcol.ftl 的区别：
#   - metrics + logs + traces 三条 pipeline（OTLP receiver 接 api/worker agent 上报）
#   - create_schema: true（沙箱自动建表，生产用 false + 自管 schema）
#   - replication_num: 1（单 BE 必须；生产多 BE 时默认 3）
#   - 含 debug exporter（便于排障）
#
# JuiceFS / ZooKeeper 的 Prometheus scrape 采集链路已在生产验证通过（生产 OtelScrapeConfigBuilder
# 按角色 DDL 通用生成 scrape job，见 docs/monitoring/juicefs-otel-verification.md、
# docs/monitoring/zookeeper-otel-verification.md），本沙箱不再单独跑 obs-juicefs/obs-zookeeper
# 容器，故已移除 prometheus/juicefs、prometheus/zookeeper 这两个 receiver。
# Doris FE 指标端点：:8030/metrics；Doris BE 指标端点：:8040/metrics

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

receivers:
  # OTLP receiver：接收 datasophon-api / worker 通过 OTel Java Agent 上报的 traces + logs
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Collector self-metrics：用于 Collector 监控看板趋势数据验证。
  # 生产模板 otelcol.ftl 已包含 prometheus/self；本地 compose 也需要抓取 :8888，
  # 否则 Doris 中不会出现 otelcol_* 指标。
  prometheus/self:
    config:
      scrape_configs:
        - job_name: OtelCollector
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets: ["127.0.0.1:8888"]
              labels:
                instance: obs-otelcol

  # Doris FE + BE Prometheus 指标采集。
  # obs-doris-fe/be 既充当存储 Doris 又充当被监控 Doris（沙箱一机两用）。
  # job_name/labels 镜像生产 OtelScrapeConfigBuilder 的真实产出（按角色分两个 job：
  # DorisFE/DorisBE，各带 group=fe/be），2026-06-29/30 Phase E 后生产已不再用旧的
  # 单一 job="doris"，此处同步更新以便验证 doris-monitor-tab-otel 任务的 job 漂移修复。
  prometheus/doris:
    config:
      scrape_configs:
        - job_name: DorisFE
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets: ["obs-doris-fe:8030"]
              labels:
                group: fe
                instance: obs-doris-fe:8030
        - job_name: DorisBE
          scrape_interval: 15s
          metrics_path: /metrics
          static_configs:
            - targets: ["obs-doris-be:8040"]
              labels:
                group: be
                instance: obs-doris-be:8040

  # host_metrics：验证「节点主机监控」采集链路（system.* 指标），替代旧 node_exporter 方案。
  # 沙箱容器视角指标，仅用于验证管道通、数据落 Doris、身份正确；数值真实性需真实节点。
  host_metrics:
    collection_interval: 15s
    scrapers:
      cpu: {}
      load: {}
      memory:
        metrics:
          system.linux.memory.available:
            enabled: true
      disk: {}
      filesystem: {}
      network: {}

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
  # NaN 分位数丢弃：dorisexporter 把 NaN 序列化进 Stream Load JSON 时报
  # "json: unsupported value: NaN"，导致整批导出失败并触发 retry 风暴，backoff 持续增长直到
  # sending_queue 被占满、连累 gauge/sum 表的新数据也停止写入（详见
  # docs/monitoring/zookeeper-otel-verification.md 的采集侧缺陷记录）。
  # 仅覆盖"Summary 从未被观测到，count=0 且 quantile 恒为 NaN"这一种成因，对 DorisMonitor/
  # NexusMonitor 的 JVM/Jetty timer 面板同样适用，与具体角色无关，保留在此。
  filter/drop_empty_summary:
    metrics:
      datapoint:
        - 'metric.type == METRIC_DATA_TYPE_SUMMARY and count == 0'
  batch:
    timeout: 5s
  # 沙箱身份写死为 sandbox-node；生产 otelcol.ftl 用真实 hostname（见 resource/host_metrics 注释）
  resource/host_metrics:
    attributes:
      - key: service.name
        value: node
        action: upsert
      - key: service.instance.id
        value: sandbox-node
        action: upsert

exporters:
  doris:
    endpoint: http://obs-doris-fe:8030    # Stream Load HTTP（写数据）
    mysql_endpoint: obs-doris-fe:9030     # MySQL 协议（create_schema=true 时建表用）
    database: otel
    username: root
    password: ""
    # 沙箱模式：让 exporter 自动建 otel 库表（生产用 false + 自管 DDL）
    create_schema: true
    replication_num: 1                    # 单 BE 必须；否则建表因副本不足报错
    timezone: UTC
    timeout: 30s
    table:
      metrics: otel_metrics
      logs: otel_logs
      traces: otel_traces
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 500
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
  # debug exporter：输出到 collector 日志，便于排障确认指标流动
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      # v0.154.0 已废弃 metrics.address；改用 readers/pull/prometheus
      readers:
        - pull:
            exporter:
              prometheus:
                host: "0.0.0.0"
                port: 8888
  pipelines:
    metrics:
      receivers: [prometheus/self, prometheus/doris, otlp]
      processors: [memory_limiter, filter/drop_empty_summary, batch]
      exporters: [doris, debug]
    metrics/host:
      receivers: [host_metrics]
      processors: [memory_limiter, resource/host_metrics, batch]
      exporters: [doris, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [doris, debug]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [doris, debug]
