language=chinese
install.path=/data/install_datasophon
frameCode=DDP-1.0.0
clusterId=1
rows=200
times=20
timeOutPeriodOne=1
timeOutPeriodTwo=2
INIT_HOME=/data/datasophon/datasophon-init
MASTER_INSTALL_HOME=/data/datasophon
ssh_port=22

mysql.ip=mw-mysql
mysql.port=3306
mysql.database=datasophon
mysql.username=datasophon
mysql.password=datasophon

# Workers resolve master via Docker DNS: service name = mw-api
masterHost=mw-api
server.port=8080
server.address=0.0.0.0

temp.dir=/tmp/datasophon
transport=grpc
k8s.agent.auth.enabled=false

nexus.enable=true
nexus.ip=mw-nexus
nexus.port=8081
nexus.username=admin
nexus.password=admin123
