language=chinese
install.path=/data/install_datasophon
frameCode=DDP-1.0.0
clusterId=1
rows=200
times=20
timeOutPeriodOne=1
timeOutPeriodTwo=2
INIT_HOME=/data/datasophon/datasophon-init
MASTER_INSTALL_HOME=/data/datasophon
ssh_port=22

mysql.ip=mw-mysql
mysql.port=3306
mysql.database=datasophon
mysql.username=datasophon
mysql.password=datasophon

# 所有节点（mw1/app1/app2）在 Docker 网络中均通过 mw-api DNS 名找到 API
# 真实部署：mw1 用 127.0.0.1，app 节点用 mw1 实际 IP
masterHost=mw-api
server.port=8080
server.address=0.0.0.0

temp.dir=/tmp/datasophon
transport=grpc
k8s.agent.auth.enabled=false

nexus.enable=true
nexus.ip=mw-nexus
nexus.port=8081
nexus.username=admin
nexus.password=admin123
