# 可观测链路模拟测试 compose
# 拓扑：APISIX(采集源，standalone 模式) → otel-collector(prometheus scrape + dorisexporter) → Doris(存储)
#
# 版本对应 package/manifest.json：Doris 4.0.5、otelcol-contrib 0.154.0、APISIX 3.16.0
# APISIX 版本：apache/apisix:3.16.0-debian，standalone 模式（无 etcd，路由声明在 conf/apisix/apisix.yaml）
#
# 启动前提（本地 Mac）：
#   - Docker Desktop 已运行（BE 依赖 vm.max_map_count，Docker Desktop on Mac 的 VM 已满足）
#
# 用法：
#   docker compose -f deploy/compose/docker-compose.observability.yml up -d
#   docker compose -f deploy/compose/docker-compose.observability.yml logs -f obs-otelcol
#   # 验证、DDL 导出详见 deploy/compose/observability-stack.md

services:

  # ─── Doris FE（Frontend，SQL 查询入口 + 元数据管理） ──────────────────────────
  obs-doris-fe:
    image: apache/doris:fe-4.0.5
    container_name: obs-doris-fe
    hostname: obs-doris-fe
    environment:
      # FE_SERVERS 必须写固定 IP（priority_networks），不能用 service 名
      - FE_SERVERS=fe1:10.10.30.2:9010
      - FE_ID=1
    ports:
      - "8030:8030"   # HTTP / Stream Load（dorisexporter 写入）
      - "9030:9030"   # MySQL 协议查询端口
    volumes:
      - obs-fe-meta:/opt/apache-doris/fe/doris-meta
      - obs-fe-log:/opt/apache-doris/fe/log
    networks:
      obs_net:
        ipv4_address: 10.10.30.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─── Doris BE（Backend，数据存储与计算） ──────────────────────────────────────
  obs-doris-be:
    image: apache/doris:be-4.0.5
    container_name: obs-doris-be
    hostname: obs-doris-be
    environment:
      - FE_SERVERS=fe1:10.10.30.2:9010
      # BE_ADDR 同样写固定 IP + 心跳端口
      - BE_ADDR=10.10.30.3:9050
    ports:
      - "8040:8040"   # BE HTTP 端口（调试用）
    volumes:
      - obs-be-storage:/opt/apache-doris/be/storage
      - obs-be-log:/opt/apache-doris/be/log
    networks:
      obs_net:
        ipv4_address: 10.10.30.3
    depends_on:
      obs-doris-fe:
        condition: service_healthy

  # ─── Doris 初始化：等待 BE 向 FE 注册完成 ────────────────────────────────────
  # BE 进程启动 ≠ FE 已确认 BE Alive，需轮询 SHOW BACKENDS 直到 Alive=true
  obs-doris-init:
    image: mysql:8
    container_name: obs-doris-init
    networks:
      - obs_net
    depends_on:
      obs-doris-fe:
        condition: service_healthy
      obs-doris-be:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for Doris BE to register and become Alive..."
        for i in $$(seq 1 60); do
          alive=$$(mysql -h obs-doris-fe -P 9030 -uroot --connect-timeout=5 \
            -e "SHOW BACKENDS" 2>/dev/null \
            | awk -F'\t' 'NR==1{for(i=1;i<=NF;i++)if($$i=="Alive")col=i} NR>1&&col{if($$col=="true")n++} END{print n+0}' \
            || echo 0)
          if [ "$$alive" -ge 1 ]; then
            echo "BE is Alive. Doris ready."
            exit 0
          fi
          echo "  attempt $$i/60: BE not alive yet, retrying in 5s..."
          sleep 5
        done
        echo "ERROR: Doris BE did not become Alive within 300s"
        exit 1
    restart: "no"

  # ─── APISIX 上游（被代理的回显服务，产生可观测的响应） ──────────────────────────
  obs-echo:
    image: hashicorp/http-echo:1.0
    container_name: obs-echo
    command: ["-text=ok", "-listen=:5678"]
    networks:
      - obs_net

  # ─── APISIX（被采集的 Prometheus 指标来源，standalone 模式无需 etcd） ──────────
  obs-apisix:
    image: apache/apisix:3.16.0-debian
    container_name: obs-apisix
    volumes:
      - ./conf/apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./conf/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    ports:
      - "9080:9080"   # 数据面网关(APISIX 默认端口)
      - "9091:9091"   # prometheus 插件指标导出
    networks:
      - obs_net
    depends_on:
      - obs-echo
    healthcheck:
      # 镜像(apache/apisix:3.16.0-debian)不含 curl/wget,用镜像自带的 openresty resty CLI 发一个原始 HTTP 探测请求
      test:
        - "CMD-SHELL"
        - >-
          resty -e '
          local sock = ngx.socket.tcp()
          sock:settimeout(2000)
          local ok = sock:connect("127.0.0.1", 9091)
          if not ok then os.exit(1) end
          sock:send("GET /apisix/prometheus/metrics HTTP/1.0\r\nHost: localhost\r\n\r\n")
          local line = sock:receive("*l")
          sock:close()
          if line and line:find("200") then os.exit(0) else os.exit(1) end
          '
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  # ─── 持续压流（让 RPS/带宽/延迟等请求类指标产生真实数据） ──────────────────────
  obs-apisix-load:
    image: curlimages/curl:8.10.1
    container_name: obs-apisix-load
    entrypoint: ["sh", "-c"]
    command:
      - |
        while true; do
          curl -s -o /dev/null obs-apisix:9080/get
          sleep 0.5
        done
    networks:
      - obs_net
    depends_on:
      obs-apisix:
        condition: service_healthy
    restart: on-failure

  # ─── OTel Collector（APISIX metrics → dorisexporter → Doris） ────────────────
  obs-otelcol:
    image: otel/opentelemetry-collector-contrib:0.154.0
    container_name: obs-otelcol
    command: ["--config=/etc/otelcol/otelcol-apisix.yaml"]
    volumes:
      - ./conf/otelcol-apisix.yaml:/etc/otelcol/otelcol-apisix.yaml:ro
    ports:
      - "8888:8888"   # collector self-metrics（Prometheus 格式）
      - "4317:4317"   # OTLP gRPC（宿主机 api/worker 直发）
      - "4318:4318"   # OTLP HTTP（备用）
    networks:
      - obs_net
    depends_on:
      obs-doris-init:
        condition: service_completed_successfully
      obs-apisix:
        condition: service_healthy
    restart: on-failure   # dorisexporter 首次 create_schema 可能因 BE 初始化竞争而失败，允许重试

volumes:
  obs-fe-meta:
  obs-fe-log:
  obs-be-storage:
  obs-be-log:

networks:
  obs_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.30.0/24
          gateway: 10.10.30.1
          ip_range: 10.10.30.128/25   # 自动分配范围 .128-.254，.2/.3 保留给 FE/BE 静态分配
