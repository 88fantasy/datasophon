# 可观测链路模拟测试 compose
# 拓扑：JuiceFS(采集源，client --metrics 暴露 Prometheus 端点) → otel-collector(prometheus scrape + dorisexporter) → Doris(存储)
# JuiceFS 挂载依赖：Redis(元数据引擎) + RustFS(S3 兼容对象存储后端)
#
# 版本对应 package/manifest.json：Doris 4.0.5、otelcol-contrib 0.154.0、JuiceFS 1.3.1（juicedata/mount:ce-v1.3.1）
# JuiceFS 采集方式与生产一致：client 进程 `--metrics=0.0.0.0:9567` 暴露 `/metrics`，otelcol 用
# prometheus receiver 抓取（非 OTLP 推送），job_name 对齐生产 OtelScrapeConfigBuilder 的角色名
# "JuicefsMount"，使 service_name 落库后与 docs/monitoring/juicefs-otel-verification.md 的验证 SQL 一致。
#
# 启动前提（本地 Mac）：
#   - Docker Desktop 已运行（BE 依赖 vm.max_map_count，Docker Desktop on Mac 的 VM 已满足）
#   - JuiceFS 挂载容器需要 FUSE（cap_add SYS_ADMIN + /dev/fuse），Docker Desktop for Mac 已内置支持
#
# 用法：
#   docker compose -f deploy/compose/docker-compose.observability.yml up -d
#   docker compose -f deploy/compose/docker-compose.observability.yml logs -f obs-otelcol
#   # 验证、DDL 导出详见 deploy/compose/observability-stack.md

services:

  # ─── Doris FE（Frontend，SQL 查询入口 + 元数据管理） ──────────────────────────
  obs-doris-fe:
    image: apache/doris:fe-4.0.5
    container_name: obs-doris-fe
    hostname: obs-doris-fe
    environment:
      # FE_SERVERS 必须写固定 IP（priority_networks），不能用 service 名
      - FE_SERVERS=fe1:10.10.30.2:9010
      - FE_ID=1
    ports:
      - "8030:8030"   # HTTP / Stream Load（dorisexporter 写入）
      - "9030:9030"   # MySQL 协议查询端口
    volumes:
      - obs-fe-meta:/opt/apache-doris/fe/doris-meta
      - obs-fe-log:/opt/apache-doris/fe/log
    networks:
      obs_net:
        ipv4_address: 10.10.30.2
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8030/api/bootstrap || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ─── Doris BE（Backend，数据存储与计算） ──────────────────────────────────────
  obs-doris-be:
    image: apache/doris:be-4.0.5
    container_name: obs-doris-be
    hostname: obs-doris-be
    environment:
      - FE_SERVERS=fe1:10.10.30.2:9010
      # BE_ADDR 同样写固定 IP + 心跳端口
      - BE_ADDR=10.10.30.3:9050
    ports:
      - "8040:8040"   # BE HTTP 端口（调试用）
    volumes:
      - obs-be-storage:/opt/apache-doris/be/storage
      - obs-be-log:/opt/apache-doris/be/log
    networks:
      obs_net:
        ipv4_address: 10.10.30.3
    depends_on:
      obs-doris-fe:
        condition: service_healthy

  # ─── Doris 初始化：等待 BE 向 FE 注册完成 ────────────────────────────────────
  # BE 进程启动 ≠ FE 已确认 BE Alive，需轮询 SHOW BACKENDS 直到 Alive=true
  obs-doris-init:
    image: mysql:8
    container_name: obs-doris-init
    networks:
      - obs_net
    depends_on:
      obs-doris-fe:
        condition: service_healthy
      obs-doris-be:
        condition: service_started
    entrypoint: ["bash", "-c"]
    command:
      - |
        echo "Waiting for Doris BE to register and become Alive..."
        for i in $$(seq 1 60); do
          alive=$$(mysql -h obs-doris-fe -P 9030 -uroot --connect-timeout=5 \
            -e "SHOW BACKENDS" 2>/dev/null \
            | awk -F'\t' 'NR==1{for(i=1;i<=NF;i++)if($$i=="Alive")col=i} NR>1&&col{if($$col=="true")n++} END{print n+0}' \
            || echo 0)
          if [ "$$alive" -ge 1 ]; then
            echo "BE is Alive. Doris ready."
            exit 0
          fi
          echo "  attempt $$i/60: BE not alive yet, retrying in 5s..."
          sleep 5
        done
        echo "ERROR: Doris BE did not become Alive within 300s"
        exit 1
    restart: "no"

  # ─── Redis（JuiceFS 元数据引擎） ──────────────────────────────────────────────
  obs-redis:
    image: redis:7-alpine
    container_name: obs-redis
    networks:
      - obs_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # ─── RustFS 数据卷权限初始化（一次性，非 root 进程需 UID/GID 10001 可写） ──────
  # 实测：不 chown 时 rustfs 容器因 /data 权限不足直接启动失败。
  obs-rustfs-init:
    image: busybox:1.36
    container_name: obs-rustfs-init
    command: ["chown", "-R", "10001:10001", "/data"]
    volumes:
      - obs-rustfs-data:/data
    restart: "no"

  # ─── RustFS（S3 兼容对象存储，JuiceFS 数据后端；替代 MinIO，与平台其余组件一致） ──
  obs-rustfs:
    image: rustfs/rustfs:1.0.0-beta.8
    container_name: obs-rustfs
    volumes:
      - obs-rustfs-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # 控制台
    networks:
      - obs_net
    depends_on:
      obs-rustfs-init:
        condition: service_completed_successfully

  # ─── JuiceFS 格式化（一次性，创建文件系统元数据；redis + rustfs 未就绪时重试） ──
  obs-juicefs-format:
    image: juicedata/mount:ce-v1.3.1
    container_name: obs-juicefs-format
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          if juicefs format \
              --storage s3 \
              --bucket http://obs-rustfs:9000/jfstest \
              --access-key rustfsadmin \
              --secret-key rustfsadmin \
              redis://obs-redis:6379/1 myjfs; then
            echo "JuiceFS formatted successfully"
            exit 0
          fi
          echo "format attempt $$i/30 failed, retrying in 5s..."
          sleep 5
        done
        echo "ERROR: juicefs format failed after 30 attempts"
        exit 1
    networks:
      - obs_net
    depends_on:
      obs-redis:
        condition: service_healthy
      obs-rustfs:
        condition: service_started
    restart: "no"

  # ─── JuiceFS 挂载 + 持续读写压流（让指标产生真实数据，--metrics 暴露给 otelcol 抓取） ──
  obs-juicefs:
    image: juicedata/mount:ce-v1.3.1
    container_name: obs-juicefs
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mkdir -p /mnt/jfs
        juicefs mount redis://obs-redis:6379/1 /mnt/jfs \
          -d --writeback --metrics=0.0.0.0:9567 --log=/tmp/juicefs.log
        sleep 3
        echo "JuiceFS mounted, starting load generator..."
        while true; do
          dd if=/dev/urandom of=/mnt/jfs/load.bin bs=64k count=4 2>/dev/null
          cat /mnt/jfs/load.bin > /dev/null
          cp /mnt/jfs/load.bin /mnt/jfs/load-copy.bin
          rm -f /mnt/jfs/load-copy.bin
          ls /mnt/jfs > /dev/null
          sleep 2
        done
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    security_opt:
      - apparmor:unconfined
    networks:
      - obs_net
    depends_on:
      obs-juicefs-format:
        condition: service_completed_successfully
    restart: on-failure

  # ─── ZooKeeper(单节点,PrometheusMetricsProvider 暴露 :7000/metrics,otelcol 抓取) ──
  # 用于验证 docs/monitoring/zookeeper-otel-migration-tasks.md 的 Task 0/3。
  # ZOO_CFG_EXTRA 由官方 docker-entrypoint.sh 原样追加进 zoo.cfg,与生产
  # ZOOKEEPER/service_ddl.json 的 metricsProvider.className/httpPort 参数对齐。
  obs-zookeeper:
    image: zookeeper:3.8
    container_name: obs-zookeeper
    environment:
      - ZOO_STANDALONE_ENABLED=true
      - ZOO_4LW_COMMANDS_WHITELIST=*
      - ZOO_CFG_EXTRA=metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider metricsProvider.httpPort=7000 metricsProvider.httpHost=0.0.0.0
    ports:
      - "2181:2181"
      - "17000:7000"   # 宿主 7000 被 macOS ControlCenter(AirPlay)占用,改用 17000;容器内网仍是 7000
    networks:
      - obs_net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ─── OTel Collector（JuiceFS metrics → dorisexporter → Doris） ───────────────
  obs-otelcol:
    image: otel/opentelemetry-collector-contrib:0.154.0
    container_name: obs-otelcol
    command: ["--config=/etc/otelcol/otelcol-juicefs.yaml"]
    volumes:
      - ./conf/otelcol-juicefs.yaml:/etc/otelcol/otelcol-juicefs.yaml:ro
    ports:
      - "8888:8888"   # collector self-metrics（Prometheus 格式）
      - "4317:4317"   # OTLP gRPC（宿主机 api/worker 直发）
      - "4318:4318"   # OTLP HTTP（备用）
    networks:
      - obs_net
    depends_on:
      obs-doris-init:
        condition: service_completed_successfully
      obs-juicefs:
        condition: service_started
    restart: on-failure   # dorisexporter 首次 create_schema 可能因 BE 初始化竞争而失败，允许重试

volumes:
  obs-fe-meta:
  obs-fe-log:
  obs-be-storage:
  obs-be-log:
  obs-rustfs-data:

networks:
  obs_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.30.0/24
          gateway: 10.10.30.1
          ip_range: 10.10.30.128/25   # 自动分配范围 .128-.254，.2/.3 保留给 FE/BE 静态分配
