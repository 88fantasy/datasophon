# Tomcat
server:
  port: 8080
  servlet:
    context-path: /ddh
security:
  authentication:
    type: PASSWORD
# mysql
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://${mysql.ip:localhost}:${mysql.port:3306}/${mysql.database:datasophon}?&useUnicode=true&characterEncoding=utf-8
    username: ${mysql.username:datasophon}
    password: ${mysql.password:fI5sQ4yQ4fP5}
  #json格式化全局配置
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  mvc:
    # SB3: spring.mvc.date-format → spring.mvc.format.date-time
    format:
      date-time: yyyy-MM-dd HH:mm:ss
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true
      # spring.resources.chain (SB2) was dead config in SB3 — moved here.
      # Vite already outputs content-hashed filenames so fingerprinting is
      # handled on the frontend; Spring-side content versioning is optional.
      chain:
        strategy:
          content:
            enabled: true
            paths: /**
  #国际化配置
  messages:
    basename: i18n/messages
    encoding: UTF-8
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
#mybatis
mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.datasophon.dao.entity
  typeEnumsPackage: com.datasophon.dao.enums,com.datasophon.domain.host.enums
  global-config:
    #数据库相关配置
    db-config:
      #主键类型  AUTO:"数据库ID自增", INPUT:"用户输入ID", ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: AUTO
      #字段策略 IGNORED:"忽略判断",NOT_NULL:"非 NULL 判断"),NOT_EMPTY:"非空判断"
      field-strategy: NOT_NULL
      #驼峰下划线转换
      column-underline: true
      logic-delete-value: -1
      logic-not-delete-value: 0
      table-format: "`%s`"
      column-format: "`%s`"
    banner: false
  #原生配置
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
logging:
  config: classpath:logback-api.xml


datasophon:
  migration:
    enable: true
  server:
    path-prefix: /api
  proxy-grafana:
    enable: false
  ai:
    sidecar-url: ${DDH_AI_SIDECAR_URL:http://localhost:18090}
    internal-token: ${DDH_AI_INTERNAL_TOKEN:change-me}
    model: ${ANTHROPIC_MODEL:qwen3.7-plus}

# gRPC server（Netty，与 Jetty 8081 端口独立）
grpc:
  server:
    port: 18081
#    max-threads: 32


# 在idea的启动参数，加上 -Dspringdoc.api-docs.enabled=true
springdoc:
  api-docs:
    enabled: false
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.datasophon.api.controller

