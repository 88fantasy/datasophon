# ============================================================
# Pekko 测试配置（覆盖 src/main/resources/application.conf）
#
# 与生产配置的主要差异：
#   1. provider = "local"  —— 不启动远程 TCP 传输（pekko-remote 不在测试 classpath）
#   2. 删除 remote 块  —— 避免 RemoteActorRefProvider 的 ClassNotFoundException
#   3. dispatcher 线程数缩减，降低测试资源开销
# ============================================================
pekko {
  actor {
    provider = "local"
  }
}

my-forkjoin-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"
  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 1.0
    parallelism-max = 4
  }
  throughput = 1
}

my-pinned-dispatcher {
  executor = "thread-pool-executor"
  type = PinnedDispatcher
}
