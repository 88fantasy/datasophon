# k8s agent auth
k8s.agent.auth.enabled=false
# k8s.agent.auth.public.key 和 private.key 须配对生成，通过环境变量或 Secret 管理工具注入。
# 生成方式：openssl genrsa -out k8s_agent.pem 2048
#           openssl rsa -in k8s_agent.pem -pubout -outform DER | base64
#           openssl pkcs8 -topk8 -inform PEM -outform DER -nocrypt -in k8s_agent.pem | base64
k8s.agent.auth.public.key=REPLACE_WITH_YOUR_RSA_PUBLIC_KEY
k8s.agent.auth.private.key=REPLACE_WITH_YOUR_RSA_PRIVATE_KEY
k8s.agent.auth.replay.window.seconds=300
