language=chinese
install.path=/data/install_datasophon
rows=200
timeOutPeriodOne=1
timeOutPeriodTwo=2
MASTER_INSTALL_HOME=/data/datasophon
id_rsa=/root/.ssh/id_rsa
ssh_port=22

# mysql config
mysql.ip=127.0.0.1
mysql.port=3306
mysql.database=datasophon
mysql.username=root
# 敏感字段留空，请在 conf/api.local.properties（已 .gitignore）中覆盖。
mysql.password=

# nexus
nexus.enable=true
nexus.ip=127.0.0.1
nexus.port=8081
nexus.username=admin
nexus.password=

# rustfs
rustfs.ip=127.0.0.1
rustfs.port=9000
rustfs.access_key=admin
rustfs.secret_key=

temp.dir=/tmp/datasophon

k8s.agent.nodePort=32552
# k8s agent auth
k8s.agent.auth.enabled=false
# private.key 生成方式：openssl genrsa -out k8s_agent.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform DER -nocrypt -in k8s_agent.pem | base64
# 建议通过环境变量或 Secret 管理工具注入，勿明文提交。
k8s.agent.auth.private.key=REPLACE_WITH_YOUR_RSA_PRIVATE_KEY
