openapi: "3.0.3"
info:
  title: Datasophon API — 公共组件库
  version: "3.0-SNAPSHOT"
  description: >-
    本文件仅用于被其他域 YAML 通过 $ref 引用，不直接暴露 paths。
    域 YAML 通过相对路径引用：`$ref: './_common.yaml#/components/schemas/Result'`

# ─── 安全方案 ─────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: sessionId
      description: >-
        登录成功后由服务端写入 sessionId Cookie。所有受保护接口均需携带。
    csrfHeader:
      type: apiKey
      in: header
      name: X-XSRF-TOKEN
      description: >-
        登录成功后，服务端同时写入 XSRF-TOKEN Cookie（非 HttpOnly，JS 可读）。
        所有 POST/PUT/DELETE 请求需在请求头 X-XSRF-TOKEN 中携带该值。
        GET/HEAD/OPTIONS 请求无需 CSRF 头。

  # ─── 通用响应结构 ───────────────────────────────────────────────────────────
  schemas:
    Result:
      type: object
      description: >-
        所有接口统一返回壳（com.datasophon.common.utils.Result extends HashMap）。
        除 code/msg/data 三个固定键外，部分接口会额外 put 附加键（如 total、
        clusterServiceInstance 等），请结合各接口说明查阅。
      properties:
        code:
          type: integer
          example: 200
          description: 状态码（200=成功，其余见错误码表）
        msg:
          type: string
          example: success
        data:
          description: 业务数据，类型随接口而异（对象/数组/null）
          nullable: true
      additionalProperties: true

    ResultPage:
      allOf:
        - $ref: '#/components/schemas/Result'
      description: >-
        分页列表响应。data 为数组，同时附带 total 键表示总条数。
        额外键：total (integer)。
      example:
        code: 200
        msg: success
        data: []
        total: 0

    # ─── 通用 DTO / 简单请求体 ───────────────────────────────────────────────
    IntegerIdDTO:
      type: object
      description: >-
        包含单个整型 id 的请求体（com.datasophon.api.dto.IntegerIdDTO 或同构对象）。
      properties:
        id:
          type: integer
      required: [id]
      additionalProperties: false

    IdDTO:
      type: object
      description: >-
        通用 id 请求体，id 为字符串类型。
      properties:
        id:
          type: string
      required: [id]
      additionalProperties: false

